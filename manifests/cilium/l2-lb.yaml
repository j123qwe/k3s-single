---
# Cilium LoadBalancer IP pool for home LAN.
# Adjust this range to free IPs on your local subnet.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: lan-pool
spec:
  blocks:
    - start: "192.168.1.240"
      stop: "192.168.1.250"
  serviceSelector:
    matchLabels:
      lb-pool: cilium-l2

---
# Announces service LoadBalancer IPs over L2 (ARP/NDP).
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: lan-l2-policy
spec:
  loadBalancerIPs: true
  externalIPs: true
  serviceSelector:
    matchLabels:
      lb-pool: cilium-l2
